# Reverse proxy cho ksp-pdf-signer.a.inut.vn -> app chay o 127.0.0.1:2032
#
# YEU CAU:
#  1) DNS: tao ban ghi A cho ksp-pdf-signer.a.inut.vn tro ve IP cong khai cua
#     may nay (77.87.50.212). (Hoac wildcard *.a.inut.vn.)
#  2) Chung chi HTTPS: dung certbot (Let's Encrypt):
#     sudo certbot --nginx -d ksp-pdf-signer.a.inut.vn
#  3) Dat PUBLIC_BASE_URL=https://ksp-pdf-signer.a.inut.vn trong .env (mac dinh
#     da la gia tri nay) de link chia se dung domain.
#  4) Copy file nay vao /etc/nginx/sites-available/ va ln -s sang sites-enabled,
#     roi: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name ksp-pdf-signer.a.inut.vn;
    # certbot se tu chuyen huong 80 -> 443 khi cap chung chi.

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:2032;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
