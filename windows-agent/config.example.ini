; Cau hinh Windows Agent. Copy thanh config.ini va chinh cho dung may.

[token]
; Duong dan DLL PKCS#11 cua token WIN-CA tren may Windows.
; Vi du thuong gap:
;   WatchData / mToken : C:\Windows\System32\WDPKCS.dll
;   SafeNet eToken     : C:\Windows\System32\eTPKCS11.dll
;   (WIN-CA thuong dung mot trong cac loai tren — kiem tra o thu muc driver)
pkcs11_lib = C:\Windows\System32\WDPKCS.dll

; Nhan token (de trong = dung token dau tien tim thay)
token_label =

[auth]
; Xac thuc request bang mat khau Administrator qua Windows LogonUser.
use_windows_logon = true

; Mat khau dung khi KHONG chay tren Windows / tat LogonUser (vi du test tren Linux).
; Tren may that nen de use_windows_logon = true va khong dua mat khau vao day.
admin_password = <DAT_MAT_KHAU_NGAU_NHIEN_MANH>

[server]
; Agent lang nghe HTTPS. Xem install-service.md de tao chung chi self-signed.
host = 0.0.0.0
port = 8443
